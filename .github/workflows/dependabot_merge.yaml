name: "Dependabot PR auto-merge"

on:
  pull_request_target:
    branches:
      - 'main'

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  auto-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'ibm-granite-community/granite-timeseries-cookbook' }}
    permissions:
      pull-requests: write
      contents: write
    name: "Check auto-merge"
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch Dependabot Metadata"
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Enable auto-merge"
        if: ${{ contains(fromJSON('["version-update:semver-minor","version-update:semver-patch"]'), steps.dependabot-metadata.outputs.update-type) }}
        run: |
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
